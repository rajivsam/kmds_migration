# 🤖 PROVISIONAL KMDS CONFIGURATION
# Generated by bootstrap-config utility.

working_dir: /home/rajiv/programming/dd_parser_migration/sba_migration
batch_size: 5
model_name: llama3.2
llm_timeout: 180.0
documents_dir: documents
system_prompt: You are a precise data engineering assistant. Respond strictly in JSON.
temperature: 0.0
parser:
  data_dictionary_file: sba_dd.csv
  data_dictionary_attribute_col_name: Field Name
  csv_target_column_index: 0
  dd_parser_output_dir: dd_analysis_results
  output_filename: sba_loans_raw_analysis_results.csv
  entity_tagging:
  - geographic
  prompts:
    entity_classifier:
      dataset_type_template: 'Analyze this data dictionary snippet to determine the
        dataset''s structural type.

        Data: {sample_fields}


        CRITERIA:

        1. ''panel'': Schema contains repeating attribute sets for different time
        periods in one row.

        2. ''cross-sectional'': Data represents a single snapshot. A single reference
        date column (like ''asOfDate'' or ''ReportDate'') indicates a snapshot, NOT
        a panel.


        Return a strict JSON object:

        {{"dataset_type": "cross-sectional" | "panel"}}'
      macro_domain_template: 'You are a master data architect. Scan this snippet of
        a data dictionary blueprint:

        {sample_fields}


        Identify the macroscopic business domain (e.g., Banking, Healthcare, Insurance).

        Then, generate a list of 4 to 6 coarse-grained logical entity concepts suited
        to house these attributes.


        CRITICAL RULES:

        1. DO NOT lump all attributes into a single catch-all category name.

        2. Separate attributes by their intrinsic structural nature (e.g., distinguish
        between Demographics, Risk Profiles, Financial metrics, and Spatial/Temporal
        metadata).

        3. Make sure the entity concepts are granular enough to support target variations.


        Return a strict JSON object with a single key ''logical_entities'' containing
        a list of strings.'
      entity_discovery_template: 'Classify this single data schema field:

        Field Name: {attr_str}

        Description: {desc_str}

        Physical Data Profile (Grounding Context): {stats_str}


        Instructions:

        1. Select the best match for ''entity_assignment'' from these discovered choices:
        [{hints_str}].

        2. Evaluate dedicated boolean flags for these explicit semantic targets: {targets_str}.


        Return a strict flat JSON object exactly like this example:

        {{"entity_assignment": "YourChoice", "is_geographic": false}}'
    document_processor:
      system: You are a logic extraction engine. Your task is to read domain documentation
        (SOPs, narratives, or requirements) and extract thresholds, magic numbers,
        and validation rules into a strict JSON format.
      discovery_template: "{system_prompt}\n\nTASK: Extract domain-specific logic\
        \ and rules from the provided context.\nYou may receive a Narrative Document,\
        \ a Data Dictionary summary, or both.\n\nOutput ONLY a JSON object that follows\
        \ this structure:\n{{\n    \"metadata\": {{ \"domain\": \"string\", \"version\"\
        : \"string\", \"authority_source\": \"string\" }},\n    \"constants\": {{\
        \ \"KEY\": value }},\n    \"validation_rules\": [\n        {{ \"rule_id\"\
        : \"string\", \"description\": \"string\", \"attribute\": \"string\",\n  \
        \         \"operator\": \"gt|lt|ge|le|eq|ne|in|between\", \"value\": any,\
        \ \"action\": \"flag_warning|quarantine\" }}\n    ]\n}}\n\nCONTEXT:\n--- NARRATIVE\
        \ DOCUMENT ---\n{narrative_context}\n\n--- DATA DICTIONARY SUMMARY ---\n{dd_context}\n\
        \nInformation to extract:\n- Numerical thresholds, limits, or caps.\n- Business\
        \ rules requiring specific ratios or data constraints.\n- Formatting constants.\
        \ IMPORTANT: Use the following keys in the \"constants\" object:\n    1. \"\
        FORMATTING_PADDING\": A map of column name tokens to their required digit\
        \ width (e.g., {{\"zip\": 5, \"id\": 10}}).\n    2. \"FORMATTING_TITLE_CASE\"\
        : A list of column name tokens that should be title-cased (e.g., [\"name\"\
        , \"street\", \"city\"]).\n- Other business-specific magic numbers should\
        \ be at the root of the \"constants\" object."
cleaner:
  raw_dataset_file: sba_loans_raw.csv
  custom_logic_path: scripts/domain_logic.py
  clean_output_filename: sba_loans_raw_clean.csv
  dd_cleaner_output_dir: dd_cleaner
  handshake_file: parser_cleaner_handshake.md
  profiling_report_filename: sba_loans_raw_profiling_report.md
  quarantine_dir: quarantine
  quarantine_filename: sba_loans_raw_quarantine.csv
  pipeline:
  - integrity
  - row_filter
  - profile
  - assessment
  row_filters:
    attribute_overrides:
      PlumbingCheck: "custom:smoke_test_filter"
      DisbursedLoansOnly: "custom:filter_null_disbursements"
      InvalidFirstDisbursementDate: "custom:invalid_first_disbursement_date"
  structural_assessment:
    auto_drop_constant: false
    dataset_type: cross-sectional (inferred)
    null_threshold: 0.95
  missing_values:
    prompts:
      cleaning_assistant:
        system: You are a data engineering assistant specializing in data quality.
          Analyze distributions to provide cleaning recommendations.
        recommendation_template: 'Analyze the following dataset profile and provide
          cleaning recommendations in JSON:

          {profile}'
